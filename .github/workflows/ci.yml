name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check workspace
        run: cargo check --workspace
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run non-sandbox tests
        run: cargo test --workspace -- --skip 'sandbox::linux::tests::'

  linux-sandbox:
    needs: rust
    runs-on: ubuntu-latest
    container:
      image: rust:1-bookworm
      options: --privileged
    steps:
      - name: Install checkout dependencies
        run: apt-get update && apt-get install --yes git
      - uses: actions/checkout@v4
      - name: Run Linux sandbox tests
        run: cargo test -p lite-agent-tools 'sandbox::linux::tests::' --lib -- --nocapture
