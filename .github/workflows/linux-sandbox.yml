name: Linux Sandbox

on:
  workflow_dispatch:
  push:
    paths:
      - "lite-agent-tools-native/**"
      - ".github/workflows/linux-sandbox.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "lite-agent-tools-native/**"
      - ".github/workflows/linux-sandbox.yml"
      - "Cargo.toml"
      - "Cargo.lock"

jobs:
  sandbox:
    runs-on: ubuntu-latest
    container:
      image: rust:1-bookworm
      options: --privileged
    steps:
      - name: Install checkout dependencies
        run: apt-get update && apt-get install --yes git
      - uses: actions/checkout@v4
      - name: Run Linux sandbox tests
        run: cargo test -p lite-agent-tools-native --lib -- --nocapture
